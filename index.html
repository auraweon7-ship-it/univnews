<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국 사립대학교 뉴스 대시보드</title>
<style>
  :root {
    --bg:#0f1117;--card:#1a1d27;--card-hover:#222633;
    --accent:#6c5ce7;--accent2:#a29bfe;--text:#e4e6eb;--text-dim:#8b8fa3;
    --border:#2d3148;--tag-bg:#2d2066;--tag-text:#c4b5fd;
    --source-bg:#1e3a5f;--source-text:#7dd3fc;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

  .header{background:linear-gradient(135deg,#1a1040 0%,#0f1117 100%);border-bottom:1px solid var(--border);padding:2rem 2rem 1.5rem;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;}
  .header h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#a29bfe,#6c5ce7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .header .subtitle{color:var(--text-dim);font-size:0.9rem;margin-top:0.3rem;}
  .header .meta-info{display:flex;gap:1rem;align-items:center;color:var(--text-dim);font-size:0.85rem;}
  .header .meta-info span{background:var(--card);padding:0.3rem 0.8rem;border-radius:6px;border:1px solid var(--border);}

  /* Controls Row */
  .controls{padding:1rem 2rem;display:flex;flex-wrap:wrap;gap:0.8rem;align-items:center;border-bottom:1px solid var(--border);background:rgba(26,29,39,0.6);}
  .control-group{display:flex;align-items:center;gap:0.5rem;}
  .control-group label{font-size:0.75rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;}
  .ctrl-input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.4rem 0.65rem;border-radius:6px;font-size:0.83rem;outline:none;transition:border-color 0.2s;cursor:pointer;}
  .ctrl-input:focus,.ctrl-input:hover{border-color:var(--accent);}
  select.ctrl-input{padding-right:1.5rem;}
  .search-input{width:160px;}
  .sep{color:var(--text-dim);font-size:0.85rem;margin:0 -0.1rem;}

  /* Date Presets */
  .date-presets{display:flex;gap:0.3rem;margin-left:0.3rem;}
  .preset-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:0.25rem 0.55rem;border-radius:5px;font-size:0.72rem;cursor:pointer;font-weight:600;transition:all 0.15s;}
  .preset-btn:hover{border-color:var(--accent);color:var(--text);}
  .preset-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* Perspective & Region Filters */
  .filter-row{padding:1rem 2rem;display:flex;flex-wrap:wrap;gap:1.2rem;align-items:stretch;border-bottom:2px solid var(--border);background:linear-gradient(180deg,rgba(26,29,39,0.8) 0%,rgba(15,17,23,0.9) 100%);}
  .filter-block{display:flex;flex-direction:column;gap:0.5rem;}
  .filter-block .filter-label{font-size:0.82rem;color:var(--accent2);font-weight:800;letter-spacing:0.08em;text-transform:uppercase;}
  .pill-group{display:flex;gap:0.4rem;flex-wrap:wrap;}
  .pill{padding:0.5rem 1.1rem;border-radius:8px;border:2px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:0.88rem;font-weight:700;transition:all 0.2s;}
  .pill:hover{border-color:var(--accent);color:var(--text);background:var(--card-hover);}
  .pill.active{color:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
  .pill.active[data-v="all"]{background:var(--accent);border-color:var(--accent);}
  /* perspective colors */
  .pill.active[data-v="progressive"]{background:#2563eb;border-color:#3b82f6;}
  .pill.active[data-v="moderate"]{background:#6d28d9;border-color:#8b5cf6;}
  .pill.active[data-v="conservative"]{background:#dc2626;border-color:#ef4444;}
  /* region colors */
  .pill.active[data-v="capital"]{background:#0891b2;border-color:#06b6d4;}
  .pill.active[data-v="chungcheong"]{background:#059669;border-color:#10b981;}
  .pill.active[data-v="honam"]{background:#d97706;border-color:#f59e0b;}
  .pill.active[data-v="yeongnam"]{background:#dc2626;border-color:#ef4444;}
  .pill.active[data-v="gangwon_jeju"]{background:#7c3aed;border-color:#8b5cf6;}
  .pill.active[data-v="national"]{background:#475569;border-color:#64748b;}
  .filter-sep{width:2px;height:auto;min-height:40px;background:linear-gradient(180deg,transparent,var(--accent),transparent);margin:0 0.8rem;align-self:center;border-radius:1px;}

  /* Major Types */
  .major-types{padding:0.8rem 2rem 0.5rem;display:flex;flex-wrap:wrap;gap:0.5rem;border-bottom:1px solid var(--border);background:rgba(26,29,39,0.5);}
  .major-btn{padding:0.5rem 1rem;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text-dim);cursor:pointer;font-size:0.83rem;font-weight:700;transition:all 0.2s;display:flex;align-items:center;gap:0.4rem;}
  .major-btn:hover{border-color:var(--accent);color:var(--text);}
  .major-btn.active{border-color:var(--accent);background:var(--accent);color:#fff;}
  .major-btn .cnt{font-size:0.68rem;background:rgba(255,255,255,0.15);padding:0.1rem 0.45rem;border-radius:10px;}

  /* Sub Categories */
  .sub-categories{padding:0.5rem 2rem;display:flex;flex-wrap:wrap;gap:0.35rem;border-bottom:1px solid var(--border);background:rgba(26,29,39,0.3);}
  .sub-btn{padding:0.3rem 0.7rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-size:0.76rem;font-weight:600;transition:all 0.15s;}
  .sub-btn:hover{border-color:var(--accent);color:var(--text);}
  .sub-btn.active{background:rgba(108,92,231,0.3);border-color:var(--accent);color:var(--accent2);}

  /* Stats */
  .stats-bar{display:flex;gap:0.8rem;padding:0.8rem 2rem;flex-wrap:wrap;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.7rem 1rem;flex:1;min-width:110px;}
  .stat-card .sl{font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;}
  .stat-card .sv{font-size:1.4rem;font-weight:800;color:var(--accent2);margin-top:0.15rem;}
  .stat-card .sv.sm{font-size:0.9rem;}

  /* News Grid */
  .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:1rem;padding:1.2rem 2rem 3rem;}
  .news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.25s;display:flex;flex-direction:column;}
  .news-card:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,92,231,0.15);}
  .news-card .card-header{padding:0.9rem 1.1rem 0.25rem;display:flex;justify-content:space-between;align-items:flex-start;gap:0.4rem;}
  .news-card .badges{display:flex;gap:0.25rem;flex-wrap:wrap;}
  .news-card .major-badge{font-size:0.6rem;padding:0.12rem 0.45rem;border-radius:4px;font-weight:700;white-space:nowrap;}
  .news-card .sub-badge{font-size:0.6rem;padding:0.12rem 0.4rem;border-radius:4px;font-weight:600;white-space:nowrap;background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid var(--border);}
  .news-card .persp-badge{font-size:0.58rem;padding:0.1rem 0.4rem;border-radius:3px;font-weight:700;white-space:nowrap;}
  .persp-progressive{background:#2563eb30;color:#93c5fd;border:1px solid #2563eb50;}
  .persp-moderate{background:#6d28d930;color:#c4b5fd;border:1px solid #6d28d950;}
  .persp-conservative{background:#dc262630;color:#fca5a5;border:1px solid #dc262650;}
  .news-card .region-badge{font-size:0.58rem;padding:0.1rem 0.4rem;border-radius:3px;font-weight:600;white-space:nowrap;background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid var(--border);}
  .news-card .date{font-size:0.73rem;color:var(--text-dim);white-space:nowrap;}
  .news-card .title{padding:0.3rem 1.1rem 0.4rem;font-size:0.93rem;font-weight:700;line-height:1.5;}
  .news-card .title a{color:inherit;text-decoration:none;}
  .news-card .title a:hover{color:var(--accent2);}
  .news-card .summary{padding:0 1.1rem 0.7rem;font-size:0.8rem;color:var(--text-dim);line-height:1.6;flex-grow:1;}
  .news-card .card-footer{padding:0.6rem 1.1rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;}
  .source-tag{font-size:0.68rem;background:var(--source-bg);color:var(--source-text);padding:0.12rem 0.45rem;border-radius:4px;font-weight:600;}
  .keyword-tag{font-size:0.66rem;background:var(--tag-bg);color:var(--tag-text);padding:0.12rem 0.45rem;border-radius:4px;}

  .mt-fiscal{background:#dc262620;color:#fca5a5;border:1px solid #dc262640;}
  .mt-invest{background:#06b6d420;color:#67e8f9;border:1px solid #06b6d440;}
  .mt-student{background:#10b98120;color:#6ee7b7;border:1px solid #10b98140;}
  .mt-account{background:#f59e0b20;color:#fcd34d;border:1px solid #f59e0b40;}
  .mt-sustain{background:#8b5cf620;color:#c4b5fd;border:1px solid #8b5cf640;}

  .empty-state{grid-column:1/-1;text-align:center;padding:3rem 2rem;color:var(--text-dim);}
  .empty-state .icon{font-size:2.5rem;margin-bottom:0.8rem;}

  /* Footer */
  .site-footer{background:linear-gradient(135deg,#1a1040 0%,#0f1117 100%);border-top:1px solid var(--border);padding:2rem 2rem 1.5rem;margin-top:1rem;}
  .footer-inner{max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;gap:2rem;justify-content:space-between;align-items:flex-start;}
  .footer-profile{flex:1;min-width:260px;}
  .footer-name{font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:0.3rem;}
  .footer-name-sub{font-size:0.85rem;color:var(--text-dim);margin-bottom:0.6rem;}
  .footer-affil{font-size:0.82rem;color:var(--text-dim);line-height:1.7;}
  .footer-affil a{color:var(--accent2);text-decoration:none;font-weight:600;}
  .footer-affil a:hover{text-decoration:underline;}
  .footer-links{flex:0 0 auto;display:flex;flex-direction:column;gap:0.5rem;align-items:flex-end;}
  .footer-link-item{display:flex;align-items:center;gap:0.5rem;font-size:0.82rem;color:var(--text-dim);}
  .footer-link-item a{color:var(--accent2);text-decoration:none;font-weight:600;padding:0.25rem 0.7rem;border:1px solid var(--border);border-radius:6px;transition:all 0.2s;}
  .footer-link-item a:hover{border-color:var(--accent);background:rgba(108,92,231,0.15);}
  .footer-copy{width:100%;text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:0.72rem;color:var(--text-dim);}
  @media(max-width:768px){.footer-inner{flex-direction:column;align-items:center;text-align:center;}.footer-links{align-items:center;}}

  @media(max-width:768px){
    .header{padding:1.5rem 1rem 1rem;}.header h1{font-size:1.3rem;}
    .controls,.filter-row,.major-types,.sub-categories,.stats-bar,.news-grid{padding-left:1rem;padding-right:1rem;}
    .news-grid{grid-template-columns:1fr;}
  }
  ::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>한국 사립대학교 뉴스 대시보드</h1>
      <div class="subtitle">5대 유형 + 관점 + 지역별 사립대 이슈 모니터링</div>
    </div>
    <div class="meta-info">
      <span>갱신: 2026-06-01</span>
      <span id="totalCount">전체 0건</span>
    </div>
  </div>
</div>

<!-- Controls: Date + Sort + Search -->
<div class="controls">
  <div class="control-group">
    <label>기간</label>
    <input type="date" id="dateFrom" class="ctrl-input" value="2025-01-01">
    <span class="sep">~</span>
    <input type="date" id="dateTo" class="ctrl-input" value="2026-06-01">
    <div class="date-presets" id="datePresets">
      <button class="preset-btn" data-months="1">1개월</button>
      <button class="preset-btn" data-months="3">3개월</button>
      <button class="preset-btn" data-months="6">6개월</button>
      <button class="preset-btn active" data-months="18">전체</button>
    </div>
  </div>
  <div class="control-group">
    <label>정렬</label>
    <select id="sortBy" class="ctrl-input">
      <option value="date-desc">최신순</option>
      <option value="date-asc">오래된순</option>
    </select>
  </div>
  <div class="control-group">
    <label>검색</label>
    <input type="text" id="searchInput" class="ctrl-input search-input" placeholder="키워드 검색...">
  </div>
</div>

<!-- Perspective + Region Filters -->
<div class="filter-row">
  <div class="filter-block">
    <span class="filter-label">관점</span>
    <div class="pill-group" id="perspFilter">
      <button class="pill active" data-v="all">전체</button>
      <button class="pill" data-v="progressive">진보</button>
      <button class="pill" data-v="moderate">중도</button>
      <button class="pill" data-v="conservative">보수</button>
    </div>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-block">
    <span class="filter-label">지역</span>
    <div class="pill-group" id="regionFilter">
      <button class="pill active" data-v="all">전체</button>
      <button class="pill" data-v="capital">수도권</button>
      <button class="pill" data-v="chungcheong">충청권</button>
      <button class="pill" data-v="honam">호남권</button>
      <button class="pill" data-v="yeongnam">영남권</button>
      <button class="pill" data-v="gangwon_jeju">강원·제주</button>
      <button class="pill" data-v="national">전국·정책</button>
    </div>
  </div>
</div>

<div class="major-types" id="majorTypes"></div>
<div class="sub-categories" id="subCategories"></div>
<div class="stats-bar" id="statsBar"></div>
<div class="news-grid" id="newsGrid"></div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-profile">
      <div class="footer-name">박정원 | 朴正元 | Park Jeong Weon</div>
      <div class="footer-name-sub">교수</div>
      <div class="footer-affil">
        한국외국어대학교 중국학대학 중국언어문화학부<br>
        <a href="https://k-ai.it.kr/" target="_blank" rel="noopener">K-AI 교육네트워크</a>
      </div>
    </div>
    <div class="footer-links">
      <div class="footer-link-item">APP <a href="https://kletter.kr" target="_blank" rel="noopener">kletter.kr</a></div>
      <div class="footer-link-item">APP <a href="https://kteacher.kr" target="_blank" rel="noopener">kteacher.kr</a></div>
    </div>
    <div class="footer-copy">&copy; 2026 Park Jeong Weon. All rights reserved.</div>
  </div>
</footer>

<script>
const MAJOR_TYPES = [
  {id:'all',label:'📋 전체',cssClass:''},
  {id:'fiscal',label:'💰 재정 건전성',cssClass:'mt-fiscal',subs:['tuition','fund_transfer','reserve','debt']},
  {id:'invest',label:'📚 교육 투자',cssClass:'mt-invest',subs:['edu_cost','edu_return','scholarship','faculty']},
  {id:'student',label:'🎓 학생 경쟁력',cssClass:'mt-student',subs:['enrollment','dropout','employment','intl_student']},
  {id:'account',label:'🏛️ 법인 책무성',cssClass:'mt-account',subs:['governance','audit','corruption','law']},
  {id:'sustain',label:'🌱 지속가능성',cssClass:'mt-sustain',subs:['demography','reform','regional','ai_digital']},
];
const SUB_CATS = {
  tuition:{label:'💳 등록금·등록금의존율',major:'fiscal'},
  fund_transfer:{label:'🏦 법인전입금',major:'fiscal'},
  reserve:{label:'🏧 적립금·이월금',major:'fiscal'},
  debt:{label:'📉 부채·재정위기',major:'fiscal'},
  edu_cost:{label:'💡 학생1인당 교육비',major:'invest'},
  edu_return:{label:'📊 교육비환원율',major:'invest'},
  scholarship:{label:'🎁 장학금',major:'invest'},
  faculty:{label:'👨‍🏫 교원확보율',major:'invest'},
  enrollment:{label:'📈 충원율',major:'student'},
  dropout:{label:'🚪 중도탈락률',major:'student'},
  employment:{label:'💼 취업률',major:'student'},
  intl_student:{label:'🌍 외국인 유학생',major:'student'},
  governance:{label:'⚖️ 이사회·수익용기본재산',major:'account'},
  audit:{label:'🔍 감사·정보공시',major:'account'},
  corruption:{label:'🚨 교비횡령·비리',major:'account'},
  law:{label:'📜 사립학교법',major:'account'},
  demography:{label:'👶 학령인구 대응',major:'sustain'},
  reform:{label:'🔧 구조개혁·구조개선법',major:'sustain'},
  regional:{label:'🗺️ 지역연계·생존전략',major:'sustain'},
  ai_digital:{label:'🤖 AI·디지털 전환',major:'sustain'},
};

const PERSP_LABELS = {progressive:'진보',moderate:'중도',conservative:'보수'};
const REGION_LABELS = {capital:'수도권',chungcheong:'충청권',honam:'호남권',yeongnam:'영남권',gangwon_jeju:'강원·제주',national:'전국·정책'};

// Source → Perspective mapping
const SRC_PERSP = {
  progressive:['한겨레','프레시안','오마이뉴스','여성신문','매일노동뉴스','EBS','경향신문','법률이슈','파이낸셜리뷰'],
  conservative:['한국경제','세계일보','월간조선','서울경제','중앙일보','매일신문','조선일보','동아일보'],
  moderate:['연합뉴스','교수신문','한국대학신문','비즈니스포스트','뉴스1','파이낸셜뉴스','이데일리','뉴스투데이','서울신문','전자신문','에듀동아','농민신문','지디넷','대한경제','아시아투데이','아시아타임즈','EBN','가톨릭평화방송','더스쿱','노컷뉴스','잡포스트','대구일보','디지털타임스','한국일보','뉴스워커','메트로','광주드림','동양일보','광주매일','경북매일','경상일보','경남매일','경남뉴스','경남도민','이뉴스투데이','충북일보','전남일보','강원도민일보','매경이코노미','기독공보','대구MBC','안동MBC','포항MBC']
};

function clean(s){return s.replace(/<\/?b>/g,'').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');}
function getSource(link){

let allNews = NEWS.map(n => {
  const src = getSource(n.link);
  return {...n, title:clean(n.title), source:src, perspective:getPersp(src),
    region:n.r||'national', summary:summary(n.desc), dateObj:new Date(n.pubDate),
    major:SUB_CATS[n.sub]?.major||'sustain'};
});

let activeMajor='all', activeSub='all', activePersp='all', activeRegion='all';

// Date presets
document.getElementById('datePresets').addEventListener('click',e=>{
  const btn=e.target.closest('.preset-btn');if(!btn)return;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const months=parseInt(btn.dataset.months);
  const to=new Date('2026-06-01');
  const from=new Date(to);from.setMonth(from.getMonth()-months);
  document.getElementById('dateFrom').value=from.toISOString().split('T')[0];
  document.getElementById('dateTo').value=to.toISOString().split('T')[0];
  render();
});
// Manual date change clears preset active
['dateFrom','dateTo'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
    render();
  });
});

// Perspective filter
document.getElementById('perspFilter').addEventListener('click',e=>{
  const pill=e.target.closest('.pill');if(!pill)return;
  activePersp=pill.dataset.v;
  document.querySelectorAll('#perspFilter .pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  render();
});
// Region filter
document.getElementById('regionFilter').addEventListener('click',e=>{
  const pill=e.target.closest('.pill');if(!pill)return;
  activeRegion=pill.dataset.v;
  document.querySelectorAll('#regionFilter .pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  render();
});

function renderMajorTypes(){
  const el=document.getElementById('majorTypes');
  const f=preFilter();
  const counts={all:f.length};
  MAJOR_TYPES.forEach(mt=>{if(mt.id!=='all')counts[mt.id]=f.filter(n=>n.major===mt.id).length;});
  el.innerHTML=MAJOR_TYPES.map(mt=>`<button class="major-btn ${activeMajor===mt.id?'active':''}" data-id="${mt.id}">${mt.label}<span class="cnt">${counts[mt.id]||0}</span></button>`).join('');
  el.querySelectorAll('.major-btn').forEach(b=>b.addEventListener('click',()=>{activeMajor=b.dataset.id;activeSub='all';render();}));
}

function renderSubCats(){
  const el=document.getElementById('subCategories');
  let subs;
  if(activeMajor==='all') subs=Object.entries(SUB_CATS);
  else{const mt=MAJOR_TYPES.find(m=>m.id===activeMajor);subs=mt?.subs?mt.subs.map(s=>[s,SUB_CATS[s]]):[];}
  const f=preFilter();
  const counts={};subs.forEach(([id])=>{counts[id]=f.filter(n=>n.sub===id).length;});
  el.innerHTML=`<button class="sub-btn ${activeSub==='all'?'active':''}" data-id="all">전체</button>`+subs.map(([id,cat])=>`<button class="sub-btn ${activeSub===id?'active':''}" data-id="${id}">${cat.label} (${counts[id]||0})</button>`).join('');
  el.querySelectorAll('.sub-btn').forEach(b=>b.addEventListener('click',()=>{activeSub=b.dataset.id;render();}));
}

function preFilter(){
  const from=new Date(document.getElementById('dateFrom').value);
  const to=new Date(document.getElementById('dateTo').value);to.setHours(23,59,59);
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  return allNews.filter(n=>{
    if(activePersp!=='all'&&n.perspective!==activePersp)return false;
    if(activeRegion!=='all'&&n.region!==activeRegion)return false;
    if(n.dateObj<from||n.dateObj>to)return false;
    if(q&&!(n.title.toLowerCase().includes(q)||n.desc.toLowerCase().includes(q)||n.source.toLowerCase().includes(q)))return false;
    return true;
  });
}

function getFiltered(){
  let f=preFilter();
  if(activeMajor!=='all')f=f.filter(n=>n.major===activeMajor);
  if(activeSub!=='all')f=f.filter(n=>n.sub===activeSub);
  const sort=document.getElementById('sortBy').value;
  f.sort((a,b)=>sort==='date-desc'?b.dateObj-a.dateObj:a.dateObj-b.dateObj);
  return f;
}

function renderStats(f){
  const pc={};f.forEach(n=>{pc[n.perspective]=(pc[n.perspective]||0)+1;});
  const rc={};f.forEach(n=>{rc[n.region]=(rc[n.region]||0)+1;});
  const srcs=new Set(f.map(n=>n.source));
  const latest=f.length?f.reduce((a,b)=>a.dateObj>b.dateObj?a:b):null;
  const topReg=Object.entries(rc).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="sl">표시 뉴스</div><div class="sv">${f.length}</div></div>
    <div class="stat-card"><div class="sl">진보/중도/보수</div><div class="sv sm">${pc.progressive||0} / ${pc.moderate||0} / ${pc.conservative||0}</div></div>
    <div class="stat-card"><div class="sl">최다 지역</div><div class="sv sm">${topReg?REGION_LABELS[topReg[0]]||topReg[0]:'-'}</div></div>
    <div class="stat-card"><div class="sl">언론사</div><div class="sv">${srcs.size}</div></div>
    <div class="stat-card"><div class="sl">최신</div><div class="sv sm">${latest?latest.dateObj.toLocaleDateString('ko-KR'):'-'}</div></div>
  `;
  document.getElementById('totalCount').textContent=`전체 ${allNews.length}건`;
}

function renderNews(f){
  const grid=document.getElementById('newsGrid');
  if(!f.length){grid.innerHTML=`<div class="empty-state"><div class="icon">&#128270;</div><p>해당 조건에 맞는 뉴스가 없습니다.</p></div>`;return;}
  grid.innerHTML=f.map(n=>{
    const mt=MAJOR_TYPES.find(m=>m.id===n.major);
    const sc=SUB_CATS[n.sub];
    const d=n.dateObj.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
    const pCls=`persp-${n.perspective}`;
    return `<div class="news-card">
      <div class="card-header">
        <div class="badges">
          <span class="major-badge ${mt?.cssClass||''}">${mt?.label||''}</span>
          <span class="sub-badge">${sc?.label||''}</span>
          <span class="persp-badge ${pCls}">${PERSP_LABELS[n.perspective]||''}</span>
          <span class="region-badge">${REGION_LABELS[n.region]||'전국'}</span>
        </div>
        <span class="date">${d}</span>
      </div>
      <div class="title"><a href="${n.link}" target="_blank" rel="noopener">${n.title}</a></div>
      <div class="summary">${n.summary}</div>
      <div class="card-footer">
        <span class="source-tag">${n.source}</span>
        ${(n.kw||[]).map(k=>`<span class="keyword-tag">${k}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function render(){renderMajorTypes();renderSubCats();const f=getFiltered();renderStats(f);renderNews(f);}
document.getElementById('sortBy').addEventListener('change',render);
document.getElementById('searchInput').addEventListener('input',render);
render();
</script>
